general {
    gaps_in = 10
    gaps_out = 0

    border_size = 1

    col.active_border = $mauve
    col.inactive_border = $base

    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    # Type of autotiler, this one is fibonacci
    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

dwindle {
    # These two make it so that windows split in the same way every single time
    preserve_split = true
    force_split = 2
}

misc {
    disable_hyprland_logo = true
    focus_on_activate = true
}

